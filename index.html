<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paulynvine | Web Developer</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* NAVBAR */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: #111827;
  animation: slideDown 0.6s ease;
}

.nav a {
  color: white;
  margin-left: 15px;
  text-decoration: none;
  transition: 0.3s;
}

.nav a:hover {
  color: #38bdf8;
}

/* HERO */
.hero {
  text-align: center;
  padding: 90px 20px;
  animation: fadeIn 1s ease;
}

img {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: 3px solid #38bdf8;
  object-fit: cover;
  animation: pop 1s ease;
}

h1 {
  margin-top: 20px;
  animation: fadeUp 1.2s ease;
}

p {
  color: #cbd5e1;
  animation: fadeUp 1.4s ease;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 25px;
  background: #38bdf8;
  color: black;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
  animation: fadeUp 1.6s ease;
}

.btn:hover {
  transform: scale(1.05);
  background: #0ea5e9;
}

/* ANIMATIONS */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes pop {
  from {
    transform: scale(0.5);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

@keyframes slideDown {
  from {
    transform: translateY(-50px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}
</style>

</head>

<body>

<!-- NAV -->
<div class="nav">
  <h3 style="color:#38bdf8;">Paulynvine</h3>
  <div>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="projects.html">Projects</a>
    <a href="contact.html">Contact</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">

  <img src="IMG_0570.png" alt="profile">

  <h1>Hi, I'm Paulynvine</h1>
  <p>Frontend Web Developer | I build modern websites that attract customers and grow businesses</p>

  <a class="btn" href="contact.html">Hire Me</a>

</div>

</body>
</html>
